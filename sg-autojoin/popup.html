<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 320px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #e0e0e0;
    }
    .header {
      padding: 16px;
      background: linear-gradient(90deg, #0f3460, #1a1a5e);
      text-align: center;
    }
    .header h1 {
      font-size: 16px;
      color: #4fc3f7;
      margin-bottom: 4px;
    }
    .header p {
      font-size: 11px;
      color: #90a4ae;
    }
    .content {
      padding: 16px;
    }
    .info-card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      font-size: 13px;
    }
    .info-row span:first-child {
      color: #90a4ae;
    }
    .info-row span:last-child {
      font-weight: 600;
    }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 8px;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #4fc3f7, #0288d1);
      color: white;
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(79, 195, 247, 0.3);
    }
    .btn-secondary {
      background: linear-gradient(135deg, #66bb6a, #2e7d32);
      color: white;
    }
    .footer {
      padding: 12px 16px;
      text-align: center;
      font-size: 10px;
      color: #546e7a;
    }
    .status {
      text-align: center;
      padding: 8px;
      border-radius: 6px;
      margin-bottom: 12px;
      font-size: 12px;
      font-weight: 600;
    }
    .status-active {
      background: rgba(102, 187, 106, 0.2);
      color: #66bb6a;
    }
    .status-inactive {
      background: rgba(239, 83, 80, 0.2);
      color: #ef5350;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎮 SG AutoJoin</h1>
    <p>SteamGifts Giveaway Auto-Joiner</p>
  </div>
  <div class="content">
    <div id="status" class="status status-inactive">
      No estás en SteamGifts
    </div>
    <div class="info-card">
      <div class="info-row">
        <span>Versión:</span>
        <span>1.2.0</span>
      </div>
      <div class="info-row">
        <span>Estado:</span>
        <span id="panel-status">Activo</span>
      </div>
    </div>
    <button class="btn btn-primary" id="open-sg">
      🌐 Abrir SteamGifts
    </button>
    <button class="btn btn-secondary" id="open-giveaways">
      🎁 Ir a Giveaways
    </button>
  </div>
  <div class="footer">
    SG AutoJoin v1.2.0 • Hecho con ❤️
  </div>
  <script src="popup.js"></script>
</body>
</html>
